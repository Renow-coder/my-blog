  <script>
    // Switch code highlight theme based on current theme
    function updateHljsTheme() {
      const theme = document.documentElement.getAttribute('data-theme');
      const light = document.getElementById('hljs-light');
      const dark = document.getElementById('hljs-dark');
      if (theme === 'dark') {
        if (light) light.disabled = true;
        if (dark) dark.disabled = false;
      } else {
        if (light) light.disabled = false;
        if (dark) dark.disabled = true;
      }
    }

    // Update on load and on theme change
    document.addEventListener('DOMContentLoaded', () => {
      updateHljsTheme();
      const observer = new MutationObserver(() => updateHljsTheme());
      observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
    });
  </script>
